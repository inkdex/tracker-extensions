name: Registry Management

on:
  workflow_run:
    workflows:
      - Bundle and Deploy
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  registry-update:
    name: Registry Management
    runs-on: ubuntu-latest
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.REGISTRY_MANAGEMENT_APP_ID }}
          private-key: ${{ secrets.REGISTRY_MANAGEMENT_APP_PRIVATE_KEY }}
          repositories: extensions

      - name: Registry Management Workflow Dispatch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api \
            --method POST \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            /repos/inkdex/extensions/dispatches \
            -f 'event_type=registry-management' \
            -F "client_payload[repository]=${{ github.repository }}" \
            -F "client_payload[branch]=${{ github.ref_name }}"
